<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Social Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <img src="Images/Logo.jpg" alt="Profile Avatar" class="avatar">
            <h1 class="username">Edgar Ohanyan</h1>
            <p class="subtitle">Game developer, Programmer, Game Designer</p>
        </div>
        
        <div class="social-links">
            <a href="https://www.linkedin.com/in/your-profile" target="_blank" class="social-btn linkedin">
                <i class="fab fa-linkedin"></i>
                <span>LinkedIn</span>
            </a>
            <a href="https://www.instagram.com/edgar.ohanyann?igsh=MW9xdGk5dHFweXRqZg%3D%3D&utm_source=qr" target="_blank" class="social-btn instagram">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://t.me/fovyann" target="_blank" class="social-btn telegram">
                <i class="fab fa-telegram"></i>
                <span>Telegram</span>
            </a>
            <a href="https://t.me/your-channel" target="_blank" class="social-btn telegram-channel">
                <i class="fab fa-telegram"></i>
                <span>Telegram Channel</span>
            </a>
            <a href="https://vk.com/madinanakalenyaxichitaetmnenamaz" target="_blank" class="social-btn vk">
                <i class="fab fa-vk"></i>
                <span>VK</span>
            </a>
            <a href="https://github.com/EdgarOhanyan1337" target="_blank" class="social-btn github">
                <i class="fab fa-github"></i>
                <span>GitHub</span>
            </a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
